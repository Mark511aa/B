name: Build PUBGM Aimbot Tweak

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Tweak Package
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup Environment Variables
      run: |
        echo "THEOS=$(pwd)/theos" >> $GITHUB_ENV
        echo "SDK_PATH=$(pwd)/SDK" >> $GITHUB_ENV
        echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        brew install ldid dpkg
        pip3 install --upgrade pip

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git
        cd theos
        git checkout latest
        cd ..
        
        # Download iOS SDK
        mkdir -p sdks
        cd sdks
        curl -L -o iPhoneOS14.5.sdk.zip https://github.com/theos/sdks/releases/download/iphoneos14.5/iPhoneOS14.5.sdk.zip
        unzip -q iPhoneOS14.5.sdk.zip
        cd ..

    - name: Validate SDK Files
      run: |
        echo "Checking SDK files..."
        ls -la SDK/
        if [ ! -f "SDK/SHANKS_PUBGM_Basic.hpp" ]; then
          echo "❌ SDK files missing!"
          exit 1
        fi
        echo "✅ SDK files found"

    - name: Build Tweak
      run: |
        export THEOS=${{ env.THEOS }}
        export SDKROOT=$(pwd)/sdks/iPhoneOS14.5.sdk
        make clean
        make package

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: metalbiew-package
        path: |
          packages/*.deb
          packages/*.zip
        retention-days: 30

  test:
    name: Test Package Integrity
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: metalbiew-package
        path: artifacts

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg file

    - name: Validate DEB Package
      run: |
        find artifacts -name "*.deb" -type f | while read deb; do
          echo "📦 Validating: $deb"
          dpkg -I "$deb"
          file "$deb"
          
          # Verify package structure
          if dpkg --verify "$deb" 2>/dev/null; then
            echo "✅ Package valid: $deb"
          else
            echo "❌ Package invalid: $deb"
            exit 1
          fi
        done

    - name: Check Required Files
      run: |
        find artifacts -name "*.deb" -type f | while read deb; do
          echo "Checking contents of $deb..."
          dpkg -c "$deb" | grep -E "(dylib|plist|control)"
          
          # Check for dylib
          if dpkg -c "$deb" | grep -q "\.dylib$"; then
            echo "✅ Dylib found"
          else
            echo "❌ No dylib found"
            exit 1
          fi
        done

  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Check for Sensitive Data
      run: |
        echo "🔍 Scanning for sensitive data..."
        # Check for hardcoded keys
        if grep -r "API_KEY\|SECRET\|TOKEN\|PASSWORD" --include="*.mm" --include="*.h" --include="*.m" . 2>/dev/null; then
          echo "⚠️  Potential sensitive data found!"
          exit 1
        fi
        
        # Check for debug symbols
        if grep -r "NSLog\|printf\|cout" --include="*.mm" --include="*.m" . 2>/dev/null; then
          echo "ℹ️  Debug output found (not critical)"
        fi

  create-release:
    name: Create Release Package
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: metalbiew-package
        path: dist

    - name: Prepare Release Files
      run: |
        cd dist
        echo "Creating checksums..."
        sha256sum *.deb > checksums.txt
        ls -la

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.deb
          dist/checksums.txt
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Build Status
    needs: [build, test]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Create Status Summary
      run: |
        echo "## 📊 Build Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Release | ${{ needs.create-release.result }} |" >> $GITHUB_STEP_SUMMARY
