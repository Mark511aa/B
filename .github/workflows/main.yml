name: Build PUBGM Aimbot Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    name: Build Package
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Install Build Tools
      run: |
        brew install ldid dpkg
        
    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git
        
    - name: Setup iOS SDK
      run: |
        # Use system SDK instead of downloading
        export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "Using system SDK: $SDKROOT"
        echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
        
        # Verify SDK exists
        if [ ! -d "$SDKROOT" ]; then
          echo "❌ System SDK not found!"
          exit 1
        fi
        echo "✅ System SDK found"
        
    - name: Verify SDK Files
      run: |
        if [ -d "SDK" ]; then
          echo "✅ SDK directory exists"
          ls -la SDK/
        else
          echo "⚠️  SDK directory not found, but continuing with system SDK..."
        fi
        
    - name: Build Tweak
      run: |
        export THEOS=$(pwd)/theos
        export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "Building with SDKROOT: $SDKROOT"
        make clean
        make package
        
    - name: List Packages
      run: |
        echo "Generated packages:"
        find packages -name "*.deb" -type f || echo "No packages found"
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: metalbiew-package
        path: |
          packages/*.deb
          packages/*.zip
        retention-days: 30

  test:
    name: Test Package
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: metalbiew-package
        path: artifacts
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg file
        
    - name: Validate Package
      run: |
        cd artifacts
        if ls *.deb 1> /dev/null 2>&1; then
          for deb in *.deb; do
            echo "📦 Validating: $deb"
            dpkg -I "$deb"
            dpkg -c "$deb" | head -20
          done
        else
          echo "❌ No .deb files found"
          exit 1
        fi

  release:
    name: Release Package
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: metalbiew-package
        path: dist
        
    - name: Generate Checksums
      run: |
        cd dist
        if ls *.deb 1> /dev/null 2>&1; then
          sha256sum *.deb > checksums.txt
          cat checksums.txt
        else
          echo "No packages to release"
          exit 1
        fi
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.deb
          dist/checksums.txt
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status:
    name: Build Status
    needs: [build, test, release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Show Status
      run: |
        echo "## 📊 Build Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
