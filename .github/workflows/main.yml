name: Build PUBGM Aimbot Tweak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    name: Build Package
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Install Build Tools
      run: |
        brew install ldid dpkg
        
    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git
        
    - name: Setup iOS SDK
      run: |
        mkdir -p sdks
        cd sdks
        curl -L -o iPhoneOS14.5.sdk.zip https://github.com/theos/sdks/releases/download/iphoneos14.5/iPhoneOS14.5.sdk.zip
        unzip -q iPhoneOS14.5.sdk.zip
        cd ..
        
    - name: Verify SDK Files
      run: |
        if [ ! -d "SDK" ]; then
          echo "⚠️  SDK directory not found"
          exit 1
        fi
        echo "✅ SDK directory exists"
        ls -la SDK/
        
    - name: Build Tweak
      run: |
        export THEOS=$(pwd)/theos
        export SDKROOT=$(pwd)/sdks/iPhoneOS14.5.sdk
        make clean
        make package
        
    - name: List Packages
      run: |
        echo "Generated packages:"
        ls -la packages/ || echo "No packages found"
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: metalbiew-package
        path: |
          packages/*.deb
          packages/*.zip
        retention-days: 30

  test:
    name: Test Package
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: metalbiew-package
        path: artifacts
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg file
        
    - name: Validate Package
      run: |
        cd artifacts
        for deb in *.deb; do
          if [ -f "$deb" ]; then
            echo "📦 Validating: $deb"
            dpkg -I "$deb"
            dpkg -c "$deb" | head -20
          else
            echo "❌ No .deb files found"
            exit 1
          fi
        done

  release:
    name: Release Package
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: metalbiew-package
        path: dist
        
    - name: Generate Checksums
      run: |
        cd dist
        sha256sum *.deb > checksums.txt
        cat checksums.txt
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.deb
          dist/checksums.txt
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status:
    name: Build Status
    needs: [build, test, release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Show Status
      run: |
        echo "## 📊 Build Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
